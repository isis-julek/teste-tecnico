<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel de Benefícios</title>
    <link rel="stylesheet" href="componentes/css/style.css">
</head>
<body>
    <main>
        <section class="benefits-section theme-blue" aria-label="Carrossel de Benefícios">

          <div class="mockup-shadow shadow-blue"></div>
          
          <button class="carousel-btn btn-left" aria-label="Produto anterior">
            <img src="componentes/imagens/Left.svg" alt="Seta para a esquerda">
          </button>
          <button class="carousel-btn btn-right" aria-label="Próximo produto">
            <img src="componentes/imagens/Right.svg" alt="Seta para a direita">
          </button>

          <div class="carousel-container">
            <div class="carousel-track">
              
              <article class="carousel-slide is-active" data-theme="blue">
                <div class="content-left">
                  <span class="subtitle">conheça a</span>
                  <h2 class="main-title title-vitaminaD">VITAMINA D</h2>
                  <div class="gummies-container gummies-container-vitaminaD">
                    <span class="gummies gummies-vitaminaD">EM GUMMIES</span>
                  </div>
                  <div class="vectors-row" aria-hidden="true">
                    <img class="shape-amiga-vector" src="componentes/imagens/vetor-sua-melhor-amiga.svg" alt="">
                    <img class="shape-crescer-vector" src="componentes/imagens/vetor-para-crescer.svg" alt="">
                    <div class="shape-dot shape-dot-vitaminaD"></div>
                    <div class="shape-pill shape-pill-vitaminaD">
                      <span>mais forte</span>
                    </div>
                  </div>
                </div>
                <div class="content-center">
                  <img src="componentes/imagens/Portal.svg" alt="" class="portal-effect" aria-hidden="true">
                  <div class="magic-wrapper">
                    <div class="mockup-container">
                      <img src="componentes/imagens/Mockup-azul.svg" alt="" class="product-mockup" aria-hidden="true">
                      <div id="lottie-container-vitaminaD" class="lottie-overlay" aria-hidden="true"></div>
                    </div>
                  </div>
                </div>
                <div class="content-right">
                  <div class="benefit-card"><img src="componentes/imagens/Icon1.svg" alt="Mais imunidade e defesa do corpo"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon2.svg" alt="Crescimento dos ossos mais fortes"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon3.svg" alt="Dá um play no foco e no aprendizado!"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon4.svg" alt="Mais disposição e xô preguiça!"></div>
                </div>
              </article>

              <article class="carousel-slide" data-theme="green">
                <div class="content-left">
                  <span class="subtitle">conheça o</span>
                  <h2 class="main-title title-ferro">FERRO</h2>
                  <div class="gummies-container gummies-container-ferro">
                    <span class="gummies gummies-ferro">EM GUMMIES</span>
                  </div>
                  <div class="vectors-row" aria-hidden="true">
                    <img class="shape-dose-vector" src="componentes/imagens/vetor-sua-dose.svg" alt="">
                    <div class="shape-dot shape-dot-ferro"><span>de</span></div>
                    <div class="shape-pill shape-pill-ferro"><span>super</span></div>
                    <img class="shape-energia-vector" src="componentes/imagens/vetor-energia.svg" alt="">
                  </div>
                </div>
                <div class="content-center">
                  <img src="componentes/imagens/Portal.svg" alt="" class="portal-effect" aria-hidden="true">
                  <div class="magic-wrapper">
                    <div class="mockup-container">
                      <img src="componentes/imagens/Mockup-verde.svg" alt="" class="product-mockup" aria-hidden="true">
                      <div id="lottie-container-ferro" class="lottie-overlay lottie-ferro" aria-hidden="true"></div>
                    </div>
                  </div>
                </div>
                <div class="content-right">
                  <div class="benefit-card"><img src="componentes/imagens/Icon1-verde.svg" alt="Combate o cansaço e dá disposição"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon2-verde.svg" alt="Mais concentração e aprendizado!"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon3-verde.svg" alt="Mais saúde pro sangue"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon4-verde.svg" alt="Crescimento saudável"></div>
                </div>
              </article>

              <article class="carousel-slide" data-theme="yellow">
                <div class="content-left">
                  <span class="subtitle">conheça o</span>
                  <h2 class="main-title title-yellow">ÔMEGA 3</h2>
                  <div class="gummies-container gummies-container-yellow">
                    <span class="gummies gummies-yellow">EM GUMMIES</span>
                  </div>
                  <div class="vectors-row" aria-hidden="true">
                    <div class="shape-dot shape-dot-yellow"></div>
                    <div class="shape-pill shape-pill-yellow">
                      <span>Seu aliado</span>
                    </div>
                    <img class="shape-para-uma-vector" src="componentes/imagens/vetor-para-uma.svg" alt="">
                    <img class="shape-mente-vector" src="componentes/imagens/vetor-mente-mais.svg" alt="">
                  </div>
                </div>
                <div class="content-center">
                  <img src="componentes/imagens/Portal.svg" alt="" class="portal-effect" aria-hidden="true">
                  <div class="magic-wrapper">
                    <div class="mockup-container">
                      <img src="componentes/imagens/Mockup-amarelo.svg" alt="" class="product-mockup" aria-hidden="true">
                      <div id="lottie-container-amarelo" class="lottie-overlay" aria-hidden="true"></div>
                    </div>
                  </div>
                </div>
                <div class="content-right">
                  <div class="benefit-card"><img src="componentes/imagens/Icon1-amarelo.svg" alt="Melhora a memória e o aprendizado"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon2-amarelo.svg" alt="Ajuda para uma visão desenvolvida"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon3-amarelo.svg" alt="Mantém o ritmo e a saúde do coração"></div>
                  <div class="benefit-card"><img src="componentes/imagens/Icon4-amarelo.svg" alt="Mais concentração nas suas tarefas"></div>
                </div>
              </article>

            </div> 
          </div> 
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="componentes/js/script.js"></script>
</body>
</html>
